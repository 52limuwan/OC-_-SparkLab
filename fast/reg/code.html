<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Space - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-container-low": "#131313",
                "surface": "#0e0e0e",
                "on-secondary-fixed-variant": "#5c5b5d",
                "on-secondary-container": "#c1bec1",

                "error": "#ee7d77",
                "on-secondary": "#202022",
                "background": "#0e0e0e",

              fontFamily: {
                "headline": ["Manrope"],

                "label": ["Inter"]

              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-obsidian-gradient {
            background: linear-gradient(to bottom, #c6c6c6 0%, #b8b9b9 100%);
        }
      </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- Header Suppression: Auth screens do not render global navigation shell -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Aesthetic Background Elements -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-secondary-container/10 rounded-full blur-[120px] -z-10"></div>
<!-- Registration Card -->
<div class="w-full max-w-md bg-surface-container-high rounded-xl p-10 relative overflow-hidden">
<!-- Ghost Border suggestion -->
<div class="absolute inset-0 border border-outline-variant opacity-10 rounded-xl pointer-events-none"></div>
<div class="flex flex-col items-center mb-8">
<div class="text-2xl font-headline font-extrabold tracking-tighter text-on-surface mb-2">Project Space</div>
<h1 class="text-xl font-headline font-bold text-on-surface tracking-tight">Create your account</h1>
<p class="text-sm text-on-surface-variant font-body mt-1">Join the obsidian ecosystem</p>
</div>
<form class="space-y-5">
<!-- Full Name Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-outline-variant/30 transition-all outline-none" placeholder="Alex Rivera" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-outline-variant/30 transition-all outline-none" placeholder="name@domain.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-outline-variant/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-1">
<div class="mt-1">
<input class="rounded-sm bg-surface-container-lowest border-outline-variant text-primary focus:ring-offset-background focus:ring-primary transition-all" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:text-on-surface transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-on-surface transition-colors" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action -->
<button class="w-full bg-obsidian-gradient text-on-primary font-headline font-bold py-3.5 rounded-full hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 shadow-xl shadow-black/20" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-container-high px-4 text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-lowest hover:bg-surface-bright border border-outline-variant/10 rounded-lg py-3 px-4 transition-all group">
<svg class="w-5 h-5 opacity-80 group-hover:opacity-100" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#e7e5e4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#e7e5e4"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#e7e5e4"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#e7e5e4"></path>
</svg>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-lowest hover:bg-surface-bright border border-outline-variant/10 rounded-lg py-3 px-4 transition-all group">
<svg class="w-5 h-5 opacity-80 group-hover:opacity-100" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"></path>
</svg>
<span class="text-sm font-semibold">GitHub</span>
</button>
</div>
<!-- Bottom Link -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline transition-all ml-1" href="#">Sign In</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#0e0e0e] border-t border-[#484848]/10 py-6">
<div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-gray-400 font-inter text-xs tracking-wide">
                © 2024 Project Space. All rights reserved.
            </div>
<div class="flex gap-6">
<a class="text-gray-500 hover:text-gray-300 font-inter text-xs transition-colors" href="#">Privacy</a>
<a class="text-gray-500 hover:text-gray-300 font-inter text-xs transition-colors" href="#">Terms</a>
<a class="text-gray-500 hover:text-gray-300 font-inter text-xs transition-colors" href="#">Security</a>
<a class="text-gray-500 hover:text-gray-300 font-inter text-xs transition-colors" href="#">Contact</a>
</div>
</div>
</footer>
</body></html>
